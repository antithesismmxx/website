<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Masuk — ANTITHESIS</title>
<link rel="stylesheet" href="style.css"/>
<style>
/* ── Layout dua kolom ── */
.login-page{min-height:100vh;display:grid;grid-template-columns:1fr 1fr;}
@media(max-width:768px){.login-page{grid-template-columns:1fr;}}

/* ── Kolom kiri ── */
.login-left{
  position:relative;
  background:radial-gradient(ellipse at 30% 60%,rgba(201,168,76,.08) 0%,transparent 70%),#0a0a0a;
  display:flex;flex-direction:column;
  justify-content:space-between;
  padding:36px 48px 48px;
  overflow:hidden;
}
@media(max-width:768px){.login-left{display:none;}}
.login-left-logo{
  display:flex;align-items:center;gap:10px;
  text-decoration:none;
}
.login-left-logo svg{width:28px;height:28px;opacity:.7;}
.login-left-back{
  font-size:.72rem;letter-spacing:.15em;color:var(--muted);
  text-decoration:none;transition:color .2s;
}
.login-left-back:hover{color:var(--white);}
.login-left-quote{
  font-family:var(--font-serif);font-size:2.4rem;font-weight:400;
  line-height:1.25;color:var(--white);max-width:380px;
}
.login-left-quote em{font-style:italic;color:#c9a84c;}
.login-left-quote .highlight{color:#c9a84c;font-style:normal;}

/* ── Kolom kanan ── */
.login-right{
  background:var(--bg);
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  padding:48px 40px;
}
@media(max-width:480px){.login-right{padding:32px 20px;}}

.login-box{width:100%;max-width:400px;}
.login-title{font-size:1.9rem;font-weight:700;color:var(--white);margin-bottom:6px;}
.login-sub{font-size:.9rem;color:var(--muted);margin-bottom:32px;}

/* ── Field ── */
.field-group{margin-bottom:18px;}
.field-label{display:block;font-size:.78rem;font-weight:500;color:var(--muted);margin-bottom:7px;}
.field-input-wrap{position:relative;}
.field-input{
  width:100%;
  background:rgba(255,255,255,.05);
  border:.5px solid rgba(255,255,255,.1);
  color:var(--white);
  font-family:var(--font);font-size:.92rem;
  padding:11px 14px;
  border-radius:var(--r);
  outline:none;
  transition:border-color .15s;
}
.field-input:focus{border-color:var(--blue);}
.field-input::placeholder{color:var(--muted2);}
.field-input.has-toggle{padding-right:44px;}

.btn-toggle-pass{
  position:absolute;right:12px;top:50%;transform:translateY(-50%);
  background:none;border:none;cursor:pointer;
  color:var(--muted2);font-size:.9rem;line-height:1;
  padding:4px;transition:color .15s;
}
.btn-toggle-pass:hover{color:var(--white);}

/* ── Remember + Lupa ── */
.login-extras{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:22px;margin-top:-4px;
}
.remember-wrap{display:flex;align-items:center;gap:8px;cursor:pointer;}
.remember-wrap input{accent-color:var(--blue);width:14px;height:14px;cursor:pointer;}
.remember-wrap span{font-size:.78rem;color:var(--muted);}
.link-forgot{font-size:.78rem;color:var(--blue);text-decoration:none;transition:opacity .15s;}
.link-forgot:hover{opacity:.75;}

/* ── Error msg ── */
.msg-err{
  font-size:.78rem;color:#ff6b6b;
  background:rgba(255,69,58,.06);border:.5px solid rgba(255,69,58,.2);
  padding:10px 14px;border-radius:var(--r);
  margin-bottom:14px;display:none;
}
.msg-ok{
  font-size:.78rem;color:rgba(48,209,88,.9);
  background:rgba(48,209,88,.06);border:.5px solid rgba(48,209,88,.18);
  padding:10px 14px;border-radius:var(--r);
  margin-bottom:14px;display:none;
}

/* ── Tombol utama ── */
.btn-login{
  width:100%;
  background:var(--blue);color:#fff;
  font-family:var(--font);font-size:.92rem;font-weight:500;
  padding:12px;
  border:none;border-radius:var(--r);
  cursor:pointer;
  transition:background .15s,opacity .15s;
}
.btn-login:hover:not(:disabled){background:var(--blue2);}
.btn-login:disabled{opacity:.45;cursor:not-allowed;}

/* ── Footer form ── */
.login-footer{
  margin-top:22px;text-align:center;
  font-size:.82rem;color:var(--muted);
}
.login-footer a,.login-footer button.link-btn{
  color:var(--blue);text-decoration:none;
  background:none;border:none;cursor:pointer;
  font-size:.82rem;font-family:var(--font);
  transition:opacity .15s;
}
.login-footer a:hover,.login-footer button.link-btn:hover{opacity:.75;}
.login-footer-sep{display:block;margin-top:8px;}

/* ── Modal Ganti Password ── */
.modal-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,.75);
  display:flex;align-items:center;justify-content:center;
  padding:24px 16px;z-index:200;
  opacity:0;pointer-events:none;transition:opacity .25s;
}
.modal-overlay.show{opacity:1;pointer-events:all;}
.modal-box{
  width:100%;max-width:400px;
  background:var(--bg2);
  border:.5px solid var(--border2);
  border-radius:var(--r-xl);
  position:relative;overflow:hidden;
  transform:translateY(12px);transition:transform .25s;
}
.modal-overlay.show .modal-box{transform:translateY(0);}
.modal-box::before{
  content:'';position:absolute;top:0;left:0;right:0;height:.5px;
  background:linear-gradient(to right,transparent,rgba(201,168,76,.35),transparent);
}
.modal-head{
  padding:28px 28px 16px;
  border-bottom:.5px solid var(--border2);
}
.modal-head-title{
  font-family:var(--font-serif);font-size:1.3rem;font-weight:400;color:var(--white);
}
.modal-body{padding:20px 28px 28px;}
.modal-close{
  position:absolute;top:14px;right:18px;
  background:none;border:none;cursor:pointer;
  color:var(--muted2);font-size:1rem;line-height:1;
  transition:color .15s;
}
.modal-close:hover{color:var(--white);}
</style>
</head>
<body>

<!-- ── Navbar ── -->
<header class="nav">
  <a href="index.html" class="nav-brand">
    <svg viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
      <circle cx="20" cy="20" r="19" stroke="currentColor" stroke-width="1.2" opacity=".4"/>
      <path d="M20 8 L28 28 H12 Z" stroke="currentColor" stroke-width="1.4" fill="none" opacity=".7"/>
    </svg>
  </a>
  <nav class="nav-links">
    <a href="index.html" class="nav-link">← Beranda</a>
  </nav>
</header>

<!-- ── Main ── -->
<div class="login-page">

  <!-- Kiri: Quote -->
  <div class="login-left">
    <div><!-- spacer top --></div>
    <div class="login-left-quote">
      Masuk dan sapa kembali mereka yang<br>
      pernah <span class="highlight">mengisi hari-harimu.</span>
    </div>
    <div><!-- spacer bottom --></div>
  </div>

  <!-- Kanan: Form -->
  <div class="login-right">
    <div class="login-box">

      <h1 class="login-title">Welcome</h1>
      <p class="login-sub">Masuk dengan email dan password.</p>

      <!-- Email -->
      <div class="field-group">
        <label class="field-label" for="loginEmail">Email</label>
        <input class="field-input" type="email" id="loginEmail"
               placeholder="nama@email.com" autocomplete="email"/>
      </div>

      <!-- Password -->
      <div class="field-group">
        <label class="field-label" for="loginPass">Password</label>
        <div class="field-input-wrap">
          <input class="field-input has-toggle" type="password" id="loginPass"
                 placeholder="••••••••" autocomplete="current-password"/>
          <button class="btn-toggle-pass" id="toggleLoginPass" tabindex="-1" type="button">👁</button>
        </div>
      </div>

      <!-- Extras -->
      <div class="login-extras">
        <label class="remember-wrap">
          <input type="checkbox" id="rememberMe"/>
          <span>Ingat saya</span>
        </label>
        <a href="#" class="link-forgot" id="btnOpenPass">Lupa password?</a>
      </div>

      <!-- Error -->
      <div class="msg-err" id="loginErr"></div>

      <!-- Tombol -->
      <button class="btn-login" id="btnLogin">Masuk →</button>

      <!-- Footer -->
      <div class="login-footer">
        <span class="login-footer-sep">
          Belum punya akun? <a href="register.html">Daftar di sini</a>
        </span>
      </div>

    </div>
  </div>
</div>

<!-- ── Modal Ganti / Reset Password ── -->
<div class="modal-overlay" id="passModal">
  <div class="modal-box">
    <button class="modal-close" id="btnCloseModal">✕</button>
    <div class="modal-head">
      <div class="modal-head-title">Ganti Password</div>
    </div>
    <div class="modal-body">

      <div class="field-group">
        <label class="field-label" for="gpEmail">Email</label>
        <input class="field-input" type="email" id="gpEmail"
               placeholder="nama@email.com" autocomplete="email"/>
      </div>

      <div class="field-group">
        <label class="field-label" for="gpOld">Password Lama</label>
        <div class="field-input-wrap">
          <input class="field-input has-toggle" type="password" id="gpOld"
                 placeholder="••••••••" autocomplete="current-password"/>
          <button class="btn-toggle-pass" id="toggleGpOld" tabindex="-1" type="button">👁</button>
        </div>
      </div>

      <div class="field-group">
        <label class="field-label" for="gpNew">Password Baru</label>
        <div class="field-input-wrap">
          <input class="field-input has-toggle" type="password" id="gpNew"
                 placeholder="Min. 6 karakter" autocomplete="new-password"/>
          <button class="btn-toggle-pass" id="toggleGpNew" tabindex="-1" type="button">👁</button>
        </div>
      </div>

      <div class="msg-err" id="gpErr"></div>
      <div class="msg-ok"  id="gpOk"></div>

      <button class="btn-login" id="btnGantiPass">Simpan Password Baru</button>
    </div>
  </div>
</div>

<script type="module" src="login.js"></script>
</body>
</html>
