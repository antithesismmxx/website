<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Masuk — ANTITHESIS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --gold:       #c9a84c;
      --gold-light: #e2c47a;
      --gold-dim:   rgba(201,168,76,.18);
      --gold-border:rgba(201,168,76,.35);
      --bg:         #080808;
      --surface:    #0f0f0f;
      --surface2:   #161616;
      --text:       #d4c5a0;
      --text-muted: #6b6248;
      --err:        #e74c3c;
      --ok:         #2ecc71;
      --radius:     3px;
    }

    html, body {
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: 'Montserrat', sans-serif;
    }

    /* ── Background ornament ── */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background:
        radial-gradient(ellipse 60% 40% at 50% 0%,   rgba(201,168,76,.07) 0%, transparent 70%),
        radial-gradient(ellipse 40% 60% at 100% 100%, rgba(201,168,76,.04) 0%, transparent 70%);
      pointer-events: none;
    }

    /* ── Layout ── */
    .page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 48px 16px;
    }

    .card {
      width: 100%;
      max-width: 420px;
      background: var(--surface);
      border: 1px solid var(--gold-border);
      padding: 48px 40px 44px;
      position: relative;
    }
    .card::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(201,168,76,.03) 0%, transparent 60%);
      pointer-events: none;
    }

    /* ── Header ── */
    .logo {
      text-align: center;
      margin-bottom: 36px;
    }
    .logo-title {
      font-family: 'Cinzel', serif;
      font-size: 1.55rem;
      font-weight: 700;
      letter-spacing: .35em;
      color: var(--gold);
      text-transform: uppercase;
      display: block;
    }
    .logo-sub {
      font-size: .52rem;
      letter-spacing: .32em;
      color: var(--text-muted);
      text-transform: uppercase;
      margin-top: 6px;
      display: block;
    }
    .logo-line {
      width: 48px;
      height: 1px;
      background: var(--gold-border);
      margin: 14px auto 0;
    }

    /* ── Section title ── */
    .section-title {
      font-family: 'Cinzel', serif;
      font-size: .68rem;
      letter-spacing: .28em;
      color: var(--gold);
      text-transform: uppercase;
      margin-bottom: 22px;
    }

    /* ── Form ── */
    .field { margin-bottom: 16px; }

    label {
      display: block;
      font-size: .5rem;
      letter-spacing: .26em;
      color: var(--text-muted);
      text-transform: uppercase;
      margin-bottom: 7px;
    }

    .input-wrap {
      position: relative;
      display: flex;
      align-items: center;
    }

    input[type="text"],
    input[type="email"],
    input[type="password"] {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--gold-border);
      color: var(--text);
      font-family: 'Montserrat', sans-serif;
      font-size: .72rem;
      padding: 11px 14px;
      outline: none;
      border-radius: var(--radius);
      transition: border-color .25s;
      -webkit-appearance: none;
    }
    input:focus { border-color: var(--gold); }
    input::placeholder { color: var(--text-muted); }

    .btn-eye {
      position: absolute;
      right: 10px;
      background: none;
      border: none;
      cursor: pointer;
      font-size: .85rem;
      color: var(--text-muted);
      padding: 4px;
      line-height: 1;
      user-select: none;
    }
    .btn-eye:hover { color: var(--gold); }

    /* ── Messages ── */
    .msg {
      font-size: .54rem;
      letter-spacing: .1em;
      padding: 10px 14px;
      margin-top: 4px;
      display: none;
      border-radius: var(--radius);
    }
    .msg-err { color: var(--err); background: rgba(231,76,60,.08); border: 1px solid rgba(231,76,60,.25); }
    .msg-ok  { color: var(--ok);  background: rgba(46,204,113,.08); border: 1px solid rgba(46,204,113,.25); }

    /* ── Buttons ── */
    .btn {
      display: block;
      width: 100%;
      padding: 13px 20px;
      font-family: 'Montserrat', sans-serif;
      font-size: .55rem;
      font-weight: 600;
      letter-spacing: .28em;
      text-transform: uppercase;
      cursor: pointer;
      border-radius: var(--radius);
      transition: all .25s;
      border: none;
      margin-top: 22px;
    }
    .btn-primary {
      background: var(--gold);
      color: #080808;
    }
    .btn-primary:hover:not(:disabled) {
      background: var(--gold-light);
      box-shadow: 0 0 24px rgba(201,168,76,.3);
    }
    .btn-ghost {
      background: transparent;
      border: 1px solid var(--gold-border);
      color: var(--gold);
      margin-top: 10px;
    }
    .btn-ghost:hover:not(:disabled) {
      border-color: var(--gold);
      background: var(--gold-dim);
    }
    .btn:disabled { cursor: not-allowed; }

    /* ── Divider ── */
    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 28px 0 24px;
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--gold-border);
    }
    .divider span {
      font-size: .45rem;
      letter-spacing: .22em;
      color: var(--text-muted);
      text-transform: uppercase;
      white-space: nowrap;
    }

    /* ── Link text ── */
    .link-text {
      font-size: .5rem;
      letter-spacing: .15em;
      color: var(--text-muted);
      text-align: center;
      margin-top: 18px;
    }
    .link-text a, .link-text button {
      color: var(--gold);
      text-decoration: none;
      background: none;
      border: none;
      cursor: pointer;
      font-family: 'Montserrat', sans-serif;
      font-size: inherit;
      letter-spacing: inherit;
    }
    .link-text a:hover, .link-text button:hover { color: var(--gold-light); }

    /* ══════════════════════════════════════════
       MODAL GANTI PASSWORD
    ══════════════════════════════════════════ */
    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,.82);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
      z-index: 1000;
      opacity: 0;
      pointer-events: none;
      transition: opacity .3s;
    }
    .modal-overlay.show {
      opacity: 1;
      pointer-events: all;
    }
    .modal {
      width: 100%;
      max-width: 400px;
      background: var(--surface);
      border: 1px solid var(--gold-border);
      padding: 40px 36px 36px;
      position: relative;
      transform: translateY(16px);
      transition: transform .3s;
    }
    .modal-overlay.show .modal { transform: translateY(0); }

    .modal-close {
      position: absolute;
      top: 14px; right: 18px;
      background: none;
      border: none;
      color: var(--text-muted);
      font-size: 1.1rem;
      cursor: pointer;
      line-height: 1;
      transition: color .2s;
    }
    .modal-close:hover { color: var(--gold); }

    /* ── Responsive ── */
    @media (max-width: 480px) {
      .card { padding: 36px 24px 32px; }
      .modal { padding: 32px 20px 28px; }
    }
  </style>
</head>
<body>

<div class="page">
  <div class="card">

    <!-- Logo -->
    <div class="logo">
      <span class="logo-title">Antithesis</span>
      <span class="logo-sub">Al Muayyad Surakarta</span>
      <div class="logo-line"></div>
    </div>

    <!-- Form Masuk -->
    <p class="section-title">Masuk</p>

    <div class="field">
      <label for="loginEmail">Email</label>
      <input type="email" id="loginEmail" placeholder="nama@email.com" autocomplete="email" />
    </div>

    <div class="field">
      <label for="loginPass">Password</label>
      <div class="input-wrap">
        <input type="password" id="loginPass" placeholder="••••••••" autocomplete="current-password" />
        <button class="btn-eye" id="toggleLoginPass" tabindex="-1" type="button">👁</button>
      </div>
    </div>

    <div class="msg msg-err" id="loginErr"></div>

    <button class="btn btn-primary" id="btnLogin">Masuk</button>

    <div class="divider"><span>atau</span></div>

    <button class="btn btn-ghost" id="btnToRegister">Daftar Akun Baru</button>

    <div class="link-text" style="margin-top:20px;">
      <button id="btnOpenPass">Ganti Password</button>
    </div>

  </div>
</div>

<!-- ══════════════════════════════════════════
     MODAL GANTI PASSWORD
══════════════════════════════════════════ -->
<div class="modal-overlay" id="passModal">
  <div class="modal">
    <button class="modal-close" id="btnCloseModal" title="Tutup">✕</button>

    <p class="section-title">Ganti Password</p>

    <div class="field">
      <label for="gpEmail">Email</label>
      <input type="email" id="gpEmail" placeholder="nama@email.com" autocomplete="email" />
    </div>

    <div class="field">
      <label for="gpOld">Password Lama</label>
      <div class="input-wrap">
        <input type="password" id="gpOld" placeholder="••••••••" autocomplete="current-password" />
        <button class="btn-eye" id="toggleGpOld" tabindex="-1" type="button">👁</button>
      </div>
    </div>

    <div class="field">
      <label for="gpNew">Password Baru</label>
      <div class="input-wrap">
        <input type="password" id="gpNew" placeholder="Min. 6 karakter" autocomplete="new-password" />
        <button class="btn-eye" id="toggleGpNew" tabindex="-1" type="button">👁</button>
      </div>
    </div>

    <div class="msg msg-err" id="gpErr"></div>
    <div class="msg msg-ok"  id="gpOk"></div>

    <button class="btn btn-primary" id="btnGantiPass">Simpan Password Baru</button>
  </div>
</div>

<script type="module" src="login.js"></script>
</body>
</html>
